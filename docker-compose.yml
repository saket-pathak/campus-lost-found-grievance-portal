version: '3.8'

services:
  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - SECRET_KEY=django-insecure-docker-dev-secret-key-12345
      - ALLOWED_HOSTS=*
    command: python manage.py runserver 0.0.0.0:8000
